<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学实验 - 文章列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        
        .article-card {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .article-card h2 {
            color: #2c3e50;
            font-size: 1.4em;
            margin-bottom: 10px;
        }
        
        .article-card .date {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 15px;
        }
        
        .article-card .preview {
            color: #555;
            font-size: 0.95em;
            line-height: 1.5;
            margin-top: 10px;
        }
        
        footer {
            text-align: center;
            color: white;
            padding: 30px 20px;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        @media (max-width: 600px) {
            header h1 {
                font-size: 2em;
            }
            
            .articles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 心理学实验</h1>
            <p>探索人性与心理的奥秘</p>
        </header>
        
        <main>
            <div class="articles-grid">
                <a href="如何去除嫉妒心.html" class="article-card">
                    <h2>如何去除嫉妒心</h2>
                    <div class="preview">
                        主动去帮助那个你嫉妒的人。嫉妒不是坏事，它是竞争力的来源...
                    </div>
                    <div class="date">更新于 2026年5月</div>
                </a>
                
                <!-- 新文章将在这里自动添加 -->
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 心理学实验 | 持续更新中...</p>
        </footer>
    </div>
</body>
</html>
